<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Trace Lens</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: rgba(20,20,20,0.92);
    --accent: #4DA8FF;
    --text: #f2f2f2;
    --text-dim: #9a9a9a;
    --border: rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; overscroll-behavior: none; touch-action: none;
  }
  #app { position: relative; width: 100%; height: 100vh; height: 100dvh; overflow: hidden; }

  #camera {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; background: #000;
  }

  #overlayLayer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    overflow: hidden; pointer-events: none;
  }
  #traceImg {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform, opacity;
    pointer-events: none;
    -webkit-user-select: none; user-select: none;
    display: none;
    filter: var(--img-filter, none);
  }

  #gestureCatcher {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 5;
  }

  /* Empty state */
  #emptyState {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 4; text-align: center; padding: 24px;
    pointer-events: none;
  }
  #emptyState.hidden { display: none; }
  #emptyState .icon {
    width: 64px; height: 64px; border-radius: 50%;
    border: 1.5px dashed rgba(255,255,255,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: rgba(255,255,255,0.6);
  }
  #emptyState p { margin: 0; color: var(--text-dim); font-size: 14px; max-width: 240px; line-height: 1.5; }
  #emptyState button { pointer-events: auto; }

  /* Top bar */
  #topBar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top, 12px) + 8px) 14px 10px;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
  }
  .pill-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    backdrop-filter: blur(8px);
  }
  .pill-btn:active { opacity: 0.7; }
  .pill-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .icon-btn:active { opacity: 0.7; }
  .icon-btn.danger { color: #ff6b6b; }

  #lockHint {
    position: absolute; top: calc(env(safe-area-inset-top, 12px) + 56px);
    left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 999px; font-size: 12px;
    color: var(--text-dim); z-index: 9; backdrop-filter: blur(8px);
    white-space: nowrap; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #lockHint.show { opacity: 1; }

  /* Bottom panel */
  #bottomPanel {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent 100%);
    padding: 24px 16px calc(env(safe-area-inset-bottom, 14px) + 14px);
  }
  .control-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 14px; margin-bottom: 10px;
    backdrop-filter: blur(8px);
  }
  .control-row label {
    font-size: 12px; color: var(--text-dim); width: 56px; flex-shrink: 0;
  }
  .control-row input[type=range] {
    flex: 1; accent-color: var(--accent); height: 4px;
  }
  .control-row .val {
    font-size: 12px; color: var(--text-dim); width: 36px; text-align: right; flex-shrink: 0;
  }

  #mainControls {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-top: 4px;
  }
  #lockBtn {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--panel); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: var(--text);
    backdrop-filter: blur(8px);
  }
  #lockBtn.locked { background: var(--accent); border-color: var(--accent); color: #fff; }
  #lockBtn:active { opacity: 0.8; }

  #fileInput { display: none; }

  #panelToggle {
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    margin-bottom: 6px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; width: 34px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 12px;
    backdrop-filter: blur(8px);
  }
  #bottomPanel.collapsed .control-row,
  #bottomPanel.collapsed #mainControlsWrap > #mirrorBtnRow,
  #bottomPanel.collapsed #adjustControls { display: none; }
  #bottomPanel.collapsed { padding-top: 8px; }

  #permError {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; padding: 32px; text-align: center;
    z-index: 20; background: var(--bg);
  }
  #permError.show { display: flex; }
  #permError p { color: var(--text-dim); font-size: 14px; line-height: 1.6; max-width: 280px; }

  #adjustControls.hide-row { display: none; }
</style>
</head>
<body>
<div id="app">

  <video id="camera" autoplay playsinline muted></video>

  <div id="overlayLayer">
    <img id="traceImg" alt="Reference image to trace" />
  </div>

  <div id="gestureCatcher"></div>

  <div id="emptyState">
    <div class="icon"><i>&#9998;</i></div>
    <p>Upload a reference image, position it over your paper, then lock it in place to trace.</p>
    <button class="pill-btn" id="emptyUploadBtn" style="margin-top:4px;">Choose image</button>
  </div>

  <div id="permError">
    <p id="permErrorText">Camera access is needed for tracing. Please allow camera permission in your browser settings and reload the page.</p>
  </div>

  <div id="topBar">
    <button class="icon-btn" id="flipCameraBtn" title="Flip camera">&#8635;</button>
    <div style="display:flex; gap:8px;">
      <button class="pill-btn" id="uploadBtn">Image</button>
      <button class="icon-btn danger" id="resetBtn" title="Reset position">&#8634;</button>
    </div>
  </div>

  <div id="lockHint">Drag to move &middot; pinch to scale &middot; twist to rotate</div>

  <input type="file" id="fileInput" accept="image/*">

  <div id="bottomPanel">
    <div id="panelToggle">&#9662;</div>

    <div id="adjustControls">
      <div class="control-row">
        <label>Opacity</label>
        <input type="range" id="opacitySlider" min="10" max="100" value="55">
        <span class="val" id="opacityVal">55%</span>
      </div>
      <div class="control-row">
        <label>Contrast</label>
        <input type="range" id="contrastSlider" min="50" max="200" value="100">
        <span class="val" id="contrastVal">100%</span>
      </div>
    </div>

    <div id="mainControlsWrap">
      <div id="mirrorBtnRow" style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
        <button class="pill-btn" id="mirrorBtn">Mirror image</button>
        <button class="pill-btn" id="invertBtn">High contrast</button>
      </div>
      <div id="mainControls">
        <button class="icon-btn" id="centerBtn" title="Center image">&#10021;</button>
        <button id="lockBtn" title="Lock position"><i>&#128274;</i></button>
        <button class="icon-btn" id="dimBtn" title="Toggle UI dim">&#9728;</button>
      </div>
    </div>
  </div>

</div>

<script>
(function() {
  const video = document.getElementById('camera');
  const traceImg = document.getElementById('traceImg');
  const gestureCatcher = document.getElementById('gestureCatcher');
  const emptyState = document.getElementById('emptyState');
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const emptyUploadBtn = document.getElementById('emptyUploadBtn');
  const lockBtn = document.getElementById('lockBtn');
  const resetBtn = document.getElementById('resetBtn');
  const centerBtn = document.getElementById('centerBtn');
  const flipCameraBtn = document.getElementById('flipCameraBtn');
  const opacitySlider = document.getElementById('opacitySlider');
  const opacityVal = document.getElementById('opacityVal');
  const contrastSlider = document.getElementById('contrastSlider');
  const contrastVal = document.getElementById('contrastVal');
  const mirrorBtn = document.getElementById('mirrorBtn');
  const invertBtn = document.getElementById('invertBtn');
  const dimBtn = document.getElementById('dimBtn');
  const lockHint = document.getElementById('lockHint');
  const permError = document.getElementById('permError');
  const permErrorText = document.getElementById('permErrorText');
  const bottomPanel = document.getElementById('bottomPanel');
  const panelToggle = document.getElementById('panelToggle');
  const topBar = document.getElementById('topBar');

  let state = {
    x: 0, y: 0, scale: 1, rotation: 0,
    mirrored: false,
    locked: false,
    contrastBoost: false,
    naturalW: 0, naturalH: 0
  };

  let facingMode = 'environment';
  let currentStream = null;

  // ---------- Camera ----------
  async function startCamera(mode) {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: mode, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      currentStream = stream;
      video.srcObject = stream;
      permError.classList.remove('show');
    } catch (err) {
      let msg = 'Camera access is needed for tracing. Please allow camera permission in your browser settings and reload the page.';
      if (err && err.name === 'NotFoundError') {
        msg = 'No camera was found on this device.';
      } else if (err && err.name === 'NotAllowedError') {
        msg = 'Camera permission was denied. Enable it in your browser/site settings, then reload.';
      }
      permErrorText.textContent = msg;
      permError.classList.add('show');
    }
  }

  flipCameraBtn.addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera(facingMode);
  });

  startCamera(facingMode);

  // ---------- Image upload ----------
  function openFilePicker() { fileInput.click(); }
  uploadBtn.addEventListener('click', openFilePicker);
  emptyUploadBtn.addEventListener('click', openFilePicker);

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      traceImg.onload = () => {
        state.naturalW = traceImg.naturalWidth;
        state.naturalH = traceImg.naturalHeight;
        traceImg.style.display = 'block';
        emptyState.classList.add('hidden');
        centerImage();
        showLockHint();
      };
      traceImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  function showLockHint() {
    lockHint.classList.add('show');
    clearTimeout(showLockHint._t);
    showLockHint._t = setTimeout(() => lockHint.classList.remove('show'), 3200);
  }

  // ---------- Transform ----------
  function applyTransform() {
    const mirrorScale = state.mirrored ? -1 : 1;
    traceImg.style.transform =
      `translate(${state.x}px, ${state.y}px) rotate(${state.rotation}deg) scale(${state.scale * mirrorScale}, ${state.scale})`;
  }

  function centerImage() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    if (!state.naturalW) return;
    const targetW = vw * 0.7;
    const initScale = targetW / state.naturalW;
    state.scale = initScale;
    state.rotation = 0;
    state.x = (vw - state.naturalW * initScale) / 2;
    state.y = (vh - state.naturalH * initScale) / 2;
    applyTransform();
  }

  centerBtn.addEventListener('click', centerImage);
  resetBtn.addEventListener('click', () => {
    if (state.locked) toggleLock();
    centerImage();
  });

  // ---------- Lock ----------
  function toggleLock() {
    state.locked = !state.locked;
    lockBtn.classList.toggle('locked', state.locked);
    lockBtn.innerHTML = state.locked ? '<i>&#128274;</i>' : '<i>&#128275;</i>';
    gestureCatcher.style.pointerEvents = state.locked ? 'none' : 'auto';
  }
  lockBtn.addEventListener('click', toggleLock);

  // ---------- Opacity / contrast ----------
  function updateFilter() {
    const c = contrastSlider.value;
    let filter = `contrast(${c}%)`;
    if (state.contrastBoost) filter += ' grayscale(100%) brightness(1.1) contrast(140%)';
    traceImg.style.setProperty('--img-filter', filter);
    traceImg.style.filter = filter;
  }

  opacitySlider.addEventListener('input', () => {
    traceImg.style.opacity = opacitySlider.value / 100;
    opacityVal.textContent = opacitySlider.value + '%';
  });
  traceImg.style.opacity = opacitySlider.value / 100;

  contrastSlider.addEventListener('input', () => {
    contrastVal.textContent = contrastSlider.value + '%';
    updateFilter();
  });

  mirrorBtn.addEventListener('click', () => {
    state.mirrored = !state.mirrored;
    mirrorBtn.classList.toggle('active', state.mirrored);
    applyTransform();
  });

  invertBtn.addEventListener('click', () => {
    state.contrastBoost = !state.contrastBoost;
    invertBtn.classList.toggle('active', state.contrastBoost);
    updateFilter();
  });

  // ---------- UI dim ----------
  let dimmed = false;
  dimBtn.addEventListener('click', () => {
    dimmed = !dimmed;
    topBar.style.opacity = dimmed ? '0.15' : '1';
    bottomPanel.style.opacity = dimmed ? '0.15' : '1';
  });

  // ---------- Panel collapse ----------
  let collapsed = false;
  panelToggle.addEventListener('click', () => {
    collapsed = !collapsed;
    bottomPanel.classList.toggle('collapsed', collapsed);
    panelToggle.innerHTML = collapsed ? '&#9652;' : '&#9662;';
  });

  // ---------- Gestures: drag, pinch-zoom, twist-rotate ----------
  let pointers = new Map();
  let gestureStart = null;

  function getDistance(p1, p2) {
    return Math.hypot(p1.x - p2.x, p1.y - p2.y);
  }
  function getAngle(p1, p2) {
    return Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
  }
  function getMidpoint(p1, p2) {
    return { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
  }

  gestureCatcher.addEventListener('pointerdown', (e) => {
    if (state.locked) return;
    gestureCatcher.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pointers.size === 1) {
      const p = [...pointers.values()][0];
      gestureStart = {
        type: 'drag',
        startX: p.x, startY: p.y,
        origX: state.x, origY: state.y
      };
    } else if (pointers.size === 2) {
      const [p1, p2] = [...pointers.values()];
      gestureStart = {
        type: 'transform',
        startDist: getDistance(p1, p2),
        startAngle: getAngle(p1, p2),
        origScale: state.scale,
        origRotation: state.rotation,
        startMid: getMidpoint(p1, p2),
        origX: state.x, origY: state.y
      };
    }
  });

  gestureCatcher.addEventListener('pointermove', (e) => {
    if (state.locked || !pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pointers.size === 1 && gestureStart && gestureStart.type === 'drag') {
      const p = [...pointers.values()][0];
      state.x = gestureStart.origX + (p.x - gestureStart.startX);
      state.y = gestureStart.origY + (p.y - gestureStart.startY);
      applyTransform();
    } else if (pointers.size === 2 && gestureStart && gestureStart.type === 'transform') {
      const [p1, p2] = [...pointers.values()];
      const dist = getDistance(p1, p2);
      const angle = getAngle(p1, p2);
      const scaleFactor = dist / gestureStart.startDist;
      const angleDelta = angle - gestureStart.startAngle;

      state.scale = Math.max(0.05, gestureStart.origScale * scaleFactor);
      state.rotation = gestureStart.origRotation + angleDelta;

      const mid = getMidpoint(p1, p2);
      state.x = gestureStart.origX + (mid.x - gestureStart.startMid.x);
      state.y = gestureStart.origY + (mid.y - gestureStart.startMid.y);

      applyTransform();
    }
  });

  function endPointer(e) {
    pointers.delete(e.pointerId);
    if (pointers.size === 1) {
      const p = [...pointers.values()][0];
      gestureStart = {
        type: 'drag',
        startX: p.x, startY: p.y,
        origX: state.x, origY: state.y
      };
    } else if (pointers.size === 0) {
      gestureStart = null;
    }
  }
  gestureCatcher.addEventListener('pointerup', endPointer);
  gestureCatcher.addEventListener('pointercancel', endPointer);

  // Re-center on resize/orientation change if nothing positioned yet
  window.addEventListener('resize', () => {
    // no-op: keep user's manual positioning on resize
  });

  // Prevent page scroll/zoom gestures
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('gesturestart', (e) => e.preventDefault());

})();
</script>
</body>
</html>
